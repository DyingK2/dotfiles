# =============================================================================
#  tmux.conf — for tmux 3.6+
# =============================================================================

# ---------------------------------------------------------------------------
#  General settings
# ---------------------------------------------------------------------------

# Prefix -> Ctrl-a (classic screen style: close at hand, no conflicts)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal & colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"      # truecolor support
set -as terminal-features ",xterm-kitty:RGB:usstyle"  # Kitty: truecolor + underline style/color

set -g mouse on                  # mouse support (select pane / resize / scroll)
set -g history-limit 50000       # scrollback buffer
set -g display-time 3000         # message display duration (ms)
set -g display-panes-time 2000   # pane-number display duration (ms)
set -g focus-events on           # forward focus events to terminal apps
set -g set-clipboard on          # OSC 52 clipboard integration
setw -g aggressive-resize on     # resize to smallest client when shared

# Number from 1 (0 is too far on the keyboard)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on       # renumber automatically after closing a window

# Reduce Esc delay (critical for Vim/Neovim users)
set -sg escape-time 5

# ---------------------------------------------------------------------------
#  Key bindings — general
# ---------------------------------------------------------------------------

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# More intuitive split keys (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ---------------------------------------------------------------------------
#  Pane navigation — bare Ctrl-hjkl, seamless across tmux panes and nvim
#  splits. Inlined vim-tmux-navigator (no plugin): if the focused pane runs
#  vim/nvim, forward the key; otherwise move the tmux pane.
# ---------------------------------------------------------------------------

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
# Same keys inside copy-mode (no vim to forward to here)
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
# C-l was clear-screen; reach it via prefix + C-l
bind C-l send-keys 'C-l'

# ---------------------------------------------------------------------------
#  Pane resizing
# ---------------------------------------------------------------------------

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# ---------------------------------------------------------------------------
#  Window navigation
# ---------------------------------------------------------------------------

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# (Adjacent windows: prefix n/p. Arrow-key bindings removed — Alt+1..9
#  covers direct jumps; keeps global Shift/Ctrl-Shift-arrow keys free.)

# ---------------------------------------------------------------------------
#  Copy mode — Vi style
# ---------------------------------------------------------------------------

setw -g mode-keys vi

bind Enter copy-mode                # prefix + Enter to enter copy mode
# v begin-selection / C-v rectangle / y copy / mouse-drag copy are vi-mode
# defaults — no need to rebind. Add overrides back here only if missed.

# ---------------------------------------------------------------------------
#  Session management
# ---------------------------------------------------------------------------

bind S command-prompt -p "New session name:" "new-session -s '%%'"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# Switch between sessions
bind ( switch-client -p
bind ) switch-client -n
bind Tab switch-client -l                # jump to last context (like editor Ctrl-^)

# Native prefix + s lists/previews/switches all contexts (choose-tree).

# ---------------------------------------------------------------------------
#  Handy shortcuts
# ---------------------------------------------------------------------------

# prefix + z   zoom/restore current pane (built-in; noted here as a reminder)
# prefix + !   break current pane into its own window (built-in)

# Sync input to all panes (operate several servers at once)
bind a setw synchronize-panes \; display-message "Sync panes: #{?synchronize-panes,on,off}"

# Quick popup (floating terminal)
bind Space display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Quick lazygit (if installed)
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# ---------------------------------------------------------------------------
#  Appearance — clean modern theme
# ---------------------------------------------------------------------------

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Message bar
set -g message-style "fg=#c0caf5,bg=#1a1b26,bold"
set -g message-command-style "fg=#c0caf5,bg=#1a1b26"

# Copy-mode highlight
setw -g mode-style "fg=#1a1b26,bg=#7aa2f7"

# ---------------------------------------------------------------------------
#  Status bar
# ---------------------------------------------------------------------------

set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left

# Status bar colors
set -g status-style "fg=#a9b1d6,bg=#1a1b26"

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#1a1b26] "

# Right: hostname | date time
set -g status-right-length 80
set -g status-right "#[fg=#565f89] #h #[fg=#3b4261]│#[fg=#565f89] %m-%d %H:%M "

# Window labels
setw -g window-status-format "#[fg=#565f89]  #I:#W#{?window_zoomed_flag, 󰊓,} "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold]  #I:#W#{?window_zoomed_flag, 󰊓,} #[fg=#7aa2f7,bg=#1a1b26]"
setw -g window-status-separator ""

# Activity alert
setw -g monitor-activity on
set -g visual-activity off

# ---------------------------------------------------------------------------
#  No plugins, no TPM — this file is fully self-contained.
#  Clipboard: set-clipboard on (OSC 52) via kitty -> system clipboard.
#  Pane<->nvim navigation: inlined above. Persistence: native detach only.
# ---------------------------------------------------------------------------
