# =============================================================================
#  kitty.conf — a fast, DUMB terminal canvas.
#  One kitty per niri column; tmux does all tabs/splits (layers 2/3/4).
#  kitty itself never tabs or splits — it disappears from your fingers.
#  NOTE: kitty has no inline comments; every comment must be its own line.
# =============================================================================

# ---- Appearance ----
hide_window_decorations yes
# A little breathing room so text doesn't hug the window edge.
window_padding_width 4

# ---- Font ----
# Chosen: Maple Mono NF CN (unified CN+EN + icons + ligatures).
# Alternatives kept below for easy switching: uncomment one (and comment the
# rest), then reload with Ctrl+Shift+F5. Ligatures are ON by default.
font_family      Maple Mono NF CN
# font_family      CaskaydiaCove Nerd Font
# font_family      JetBrainsMono Nerd Font
# font_family      monospace
font_size        11.0

# Smooth cursor trail (kitty 0.36+).
cursor_trail     3
background_opacity 1.0

# ---- Theme: Tokyo Night ----
# Cool blue-violet palette. Trimmed to what a tmux-canvas terminal uses:
# no tab-bar / marks / border colors, since kitty never tabs or splits here.
foreground            #c0caf5
background            #1a1b26
selection_foreground  #c0caf5
selection_background  #283457
cursor                #c0caf5
cursor_text_color     #1a1b26
url_color             #73daca
# black
color0 #15161e
color8 #414868
# red
color1 #f7768e
color9 #f7768e
# green
color2 #9ece6a
color10 #9ece6a
# yellow
color3 #e0af68
color11 #e0af68
# blue
color4 #7aa2f7
color12 #7aa2f7
# magenta
color5 #bb9af7
color13 #bb9af7
# cyan
color6 #7dcfff
color14 #7dcfff
# white
color7 #a9b1d6
color15 #c0caf5

# ---- Truecolor ----
# kitty is truecolor by default; tmux already sets
# terminal-features ",xterm-kitty:RGB:usstyle". Nothing to set here.

# ---- Scrolling / behavior (scrolling mostly handled by tmux) ----
scrollback_lines 2000
enable_audio_bell no
confirm_os_window_close 0

# ---- URL / cursor ----
# Curly underline for detected links (color comes from the theme above).
url_style curly
# Ctrl+click opens links even while tmux has grabbed the mouse.
mouse_map ctrl+left release grabbed,ungrabbed mouse_handle_click link
# Cursor keeps blinking, but settles after 10s idle.
cursor_stop_blinking_after 10.0

# ---- Discipline: kill kitty's own tab/split entrances, force single canvas ----
# Only one layout == no splitting.
enabled_layouts stack
# no new tab
map ctrl+shift+t        no_op
# no new window (kitty split)
map ctrl+shift+enter    no_op
map ctrl+shift+]        no_op
map ctrl+shift+[        no_op
# no layout switching
map ctrl+shift+l        no_op

# ---- Keep the essentials: copy / paste / font size ----
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
map ctrl+plus           change_font_size all +1.0
map ctrl+minus          change_font_size all -1.0
map ctrl+0              change_font_size all 0
